<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Muebles Yao y Abol</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* NAVBAR */
nav {
    background: #111;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* BOTONES */
.botones {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    margin: 40px 0;
}

.botones a {
    padding: 12px 20px;
    background: black;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

/* SECCIONES */
section {
    padding: 60px 20px;
    text-align: center;
}

.galeria {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.galeria img {
    width: 250px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<!-- MENÚ -->
<nav>
    <a href="#">Inicio</a>
    <a href="#fabricacion">Fabricación</a>
    <a href="#decoracion">Decoración</a>
    <a href="#remodelacion">Remodelación</a>
    <a href="#comercial">Diseño Comercial</a>
</nav>

<!-- BOTONES -->
<div class="botones">
    <a href="#fabricacion">Fabricación</a>
    <a href="#decoracion">Decoración</a>
    <a href="#remodelacion">Remodelación</a>
    <a href="#comercial">Diseño Comercial</a>
</div>

<!-- FABRICACIÓN -->
<section id="fabricacion">
    <h2>Fabricación y Restauración</h2>
    <div class="galeria">
        <img src="sala1.jpg">
        <img src="restauracion1.jpg">
    </div>
</section>

<!-- DECORACIÓN -->
<section id="decoracion">
    <h2>Decoración</h2>
    <div class="galeria">
        <img src="decoracion1.jpg">
    </div>
</section>

<!-- REMODELACIÓN -->
<section id="remodelacion">
    <h2>Remodelación</h2>
    <div class="galeria">
        <img src="remodelacion1.jpg">
    </div>
</section>

<!-- DISEÑO COMERCIAL -->
<section id="comercial">
    <h2>Diseño Comercial</h2>
    <div class="galeria">
        <img src="comercial1.jpg">
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Muebles Yao y Abol</p>
</footer>

</body>
</html>
