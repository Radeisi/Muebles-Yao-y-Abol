<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Muebles Yao y Abol</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* MENÚ */
nav {
    background: #222;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
    font-weight: bold;
}

/* GALERÍA */
.galeria {
    padding: 40px;
    text-align: center;
}

.galeria h2 {
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.grid img {
    width: 100%;
    border-radius: 10px;
    transition: transform 0.3s;
}

.grid img:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<!-- MENÚ -->
<nav>
    <a href="#">Inicio</a>
    <a href="#galeria">Galería</a>
    <a href="#">Contacto</a>
</nav>

<!-- GALERÍA -->
<section id="galeria" class="galeria">
    <h2>Nuestros Trabajos</h2>

    <div class="grid">
        <img src="sala1.jpg">
        <img src="cocina1.jpg">
        <img src="restauracion1.jpg">
    </div>
</section>

</body>
</html>
